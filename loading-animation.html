<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载动画示例</title>
  <style>
    body.temp-loading-page {
      --temp-loading-ink: #1f2a37;
      --temp-loading-muted: #5b6572;
      --temp-loading-accent: #c96c3a;
      --temp-loading-accent-soft: rgba(201, 108, 58, 0.14);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--temp-loading-ink);
      background:
        radial-gradient(circle at top left, #f7d9bd 0, transparent 30%),
        radial-gradient(circle at bottom right, #e8cbb5 0, transparent 28%),
        linear-gradient(135deg, #f7f1e8 0%, #eee4d8 100%);
    }

    .temp-loading-page * {
      box-sizing: border-box;
    }

    .temp-loading-panel {
      width: min(100%, 680px);
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 250, 243, 0.88);
      border: 1px solid rgba(201, 108, 58, 0.12);
      box-shadow: 0 24px 60px rgba(92, 72, 58, 0.16);
      backdrop-filter: blur(12px);
    }

    .temp-loading-panel-title {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .temp-loading-panel-desc {
      margin: 0 0 24px;
      color: var(--temp-loading-muted);
      line-height: 1.7;
    }

    .temp-loading-controls {
      display: grid;
      gap: 14px;
    }

    .temp-loading-label {
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: var(--temp-loading-muted);
    }

    .temp-loading-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--temp-loading-ink);
      background: #fff;
      border: 1px solid rgba(91, 101, 114, 0.2);
      border-radius: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .temp-loading-input:focus {
      border-color: var(--temp-loading-accent);
      box-shadow: 0 0 0 4px var(--temp-loading-accent-soft);
    }

    .temp-loading-button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .temp-loading-button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .temp-loading-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(31, 42, 55, 0.12);
    }

    .temp-loading-button-primary {
      color: #fff;
      background: linear-gradient(135deg, #c96c3a 0%, #a44e21 100%);
    }

    .temp-loading-button-secondary {
      color: var(--temp-loading-ink);
      background: #fff;
      border: 1px solid rgba(91, 101, 114, 0.18);
    }

    .temp-loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(31, 42, 55, var(--temp-loading-overlay-opacity, 0.38));
      backdrop-filter: blur(var(--temp-loading-overlay-blur, 0px));
      -webkit-backdrop-filter: blur(var(--temp-loading-overlay-blur, 0px));
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 9999;
    }

    .temp-loading-overlay.temp-loading-is-active {
      opacity: 1;
      visibility: visible;
    }

    .temp-loading-dialog {
      width: min(100%, 320px);
      padding: 28px 24px;
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 250, 243, 0.96);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      transform: translateY(10px) scale(0.96);
      transition: transform 0.25s ease;
    }

    .temp-loading-overlay.temp-loading-is-active .temp-loading-dialog {
      transform: translateY(0) scale(1);
    }

    .temp-loading-spinner {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 5px solid rgba(201, 108, 58, 0.18);
      border-top-color: var(--temp-loading-accent);
      animation: temp-loading-spin 0.9s linear infinite;
    }

    .temp-loading-message {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
      color: var(--temp-loading-ink);
      word-break: break-word;
    }

    .temp-loading-tip {
      margin: 18px 0 0;
      font-size: 13px;
      color: var(--temp-loading-muted);
      line-height: 1.8;
    }

    .temp-loading-code {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(201, 108, 58, 0.08);
      font-family: Consolas, "Courier New", monospace;
      color: var(--temp-loading-ink);
    }

    @keyframes temp-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .temp-loading-panel {
        padding: 24px;
        border-radius: 22px;
      }

      .temp-loading-button-row {
        flex-direction: column;
      }

      .temp-loading-button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .temp-loading-button,
      .temp-loading-overlay,
      .temp-loading-dialog {
        transition: none;
      }

      .temp-loading-spinner {
        animation: none;
      }
    }
  </style>
</head>
<body class="temp-loading-page">
  <main class="temp-loading-panel">
    <h1 class="temp-loading-panel-title">可控的加载动画</h1>
    <p class="temp-loading-panel-desc">这个页面已经内置了独立的 JS 命名空间。你可以传入加载文案、显示时长、背景模糊度和透明度，也可以更新文案或随时手动关闭。</p>

    <section class="temp-loading-controls">
      <label class="temp-loading-label" for="temp-loading-input-text">加载提示内容</label>
      <input id="temp-loading-input-text" class="temp-loading-input" type="text" value="正在加载数据，请稍候..." placeholder="输入加载时要显示的内容">

      <label class="temp-loading-label" for="temp-loading-input-duration">自动关闭时间（毫秒，填 0 表示不自动关闭）</label>
      <input id="temp-loading-input-duration" class="temp-loading-input" type="number" min="0" step="500" value="3000" placeholder="例如 3000">

      <label class="temp-loading-label" for="temp-loading-input-blur">背景模糊度（像素，可留空）</label>
      <input id="temp-loading-input-blur" class="temp-loading-input" type="number" min="0" step="1" placeholder="默认 0">

      <label class="temp-loading-label" for="temp-loading-input-opacity">背景透明度（0 到 1，可留空）</label>
      <input id="temp-loading-input-opacity" class="temp-loading-input" type="number" min="0" max="1" step="0.05" placeholder="默认 0.38">

      <div class="temp-loading-button-row">
        <button id="temp-loading-demo-show-button" class="temp-loading-button temp-loading-button-primary" type="button">显示加载动画</button>
        <button id="temp-loading-demo-hide-button" class="temp-loading-button temp-loading-button-secondary" type="button">手动关闭</button>
      </div>
    </section>

    <p class="temp-loading-tip">
      可直接调用：
      <code class="temp-loading-code">tempLoadingApi.show('正在提交...', 2000, 8, 0.45)</code>
      或
      <code class="temp-loading-code">tempLoadingApi.show({ text: '正在同步', duration: 4000, blur: 12, opacity: 0.5 })</code>
      或
      <code class="temp-loading-code">tempLoadingApi.update('马上完成...')</code>
    </p>
  </main>

  <div id="temp-loading-overlay" class="temp-loading-overlay" aria-hidden="true">
    <div class="temp-loading-dialog" role="status" aria-live="polite">
      <div class="temp-loading-spinner"></div>
      <p id="temp-loading-message" class="temp-loading-message">加载中...</p>
    </div>
  </div>

  <script>
    (() => {
      const tempLoadingElements = {
        overlay: document.getElementById("temp-loading-overlay"),
        message: document.getElementById("temp-loading-message"),
        textInput: document.getElementById("temp-loading-input-text"),
        durationInput: document.getElementById("temp-loading-input-duration"),
        blurInput: document.getElementById("temp-loading-input-blur"),
        opacityInput: document.getElementById("temp-loading-input-opacity"),
        showButton: document.getElementById("temp-loading-demo-show-button"),
        hideButton: document.getElementById("temp-loading-demo-hide-button")
      };

      const TEMP_LOADING_DEFAULT_OVERLAY_BLUR = 0;
      const TEMP_LOADING_DEFAULT_OVERLAY_OPACITY = 0.38;
      let tempLoadingTimer = null;

      // 检查核心节点是否存在，避免代码被复用到其他页面时直接报错。
      function tempLoadingHasRequiredElements() {
        return Boolean(tempLoadingElements.overlay && tempLoadingElements.message);
      }

      // 规范化背景模糊度输入，确保最终写入合法的 CSS 值。
      function tempLoadingNormalizeBlur(blurValue) {
        if (blurValue === undefined || blurValue === null || blurValue === "") {
          return TEMP_LOADING_DEFAULT_OVERLAY_BLUR + "px";
        }

        if (typeof blurValue === "number" && Number.isFinite(blurValue) && blurValue >= 0) {
          return blurValue + "px";
        }

        const tempLoadingNumericBlur = Number(blurValue);
        if (Number.isFinite(tempLoadingNumericBlur) && tempLoadingNumericBlur >= 0) {
          return tempLoadingNumericBlur + "px";
        }

        if (typeof blurValue === "string" && blurValue.trim()) {
          return blurValue.trim();
        }

        return TEMP_LOADING_DEFAULT_OVERLAY_BLUR + "px";
      }

      // 规范化背景透明度输入，并将结果限制在 0 到 1 之间。
      function tempLoadingNormalizeOpacity(opacityValue) {
        if (opacityValue === undefined || opacityValue === null || opacityValue === "") {
          return TEMP_LOADING_DEFAULT_OVERLAY_OPACITY;
        }

        const tempLoadingNumericOpacity = Number(opacityValue);
        if (!Number.isFinite(tempLoadingNumericOpacity)) {
          return TEMP_LOADING_DEFAULT_OVERLAY_OPACITY;
        }

        return Math.min(Math.max(tempLoadingNumericOpacity, 0), 1);
      }

      // 将模糊度和透明度应用到加载遮罩层上。
      function tempLoadingApplyOverlayStyle(blur, opacity) {
        if (!tempLoadingHasRequiredElements()) {
          return;
        }

        tempLoadingElements.overlay.style.setProperty("--temp-loading-overlay-blur", tempLoadingNormalizeBlur(blur));
        tempLoadingElements.overlay.style.setProperty("--temp-loading-overlay-opacity", String(tempLoadingNormalizeOpacity(opacity)));
      }

      // 显示加载动画，并按参数设置文案、显示时长和遮罩效果。
      function tempLoadingShow(options = "加载中...", durationArg, blurArg, opacityArg) {
        if (!tempLoadingHasRequiredElements()) {
          return;
        }

        let tempLoadingText = "加载中...";
        let tempLoadingDuration = 0;
        let tempLoadingBlur = TEMP_LOADING_DEFAULT_OVERLAY_BLUR;
        let tempLoadingOpacity = TEMP_LOADING_DEFAULT_OVERLAY_OPACITY;

        if (typeof options === "object" && options !== null) {
          tempLoadingText = options.text ?? tempLoadingText;
          tempLoadingDuration = Number(options.duration ?? 0);
          tempLoadingBlur = options.blur ?? tempLoadingBlur;
          tempLoadingOpacity = options.opacity ?? tempLoadingOpacity;
        } else {
          tempLoadingText = options ?? tempLoadingText;
          tempLoadingDuration = Number(durationArg ?? 0);
          tempLoadingBlur = blurArg ?? tempLoadingBlur;
          tempLoadingOpacity = opacityArg ?? tempLoadingOpacity;
        }

        if (tempLoadingTimer) {
          clearTimeout(tempLoadingTimer);
          tempLoadingTimer = null;
        }

        tempLoadingApplyOverlayStyle(tempLoadingBlur, tempLoadingOpacity);
        tempLoadingUpdate(tempLoadingText);
        tempLoadingElements.overlay.classList.add("temp-loading-is-active");
        tempLoadingElements.overlay.setAttribute("aria-hidden", "false");

        if (Number.isFinite(tempLoadingDuration) && tempLoadingDuration > 0) {
          tempLoadingTimer = setTimeout(() => {
            tempLoadingHide();
          }, tempLoadingDuration);
        }
      }

      // 更新加载文案，但不改变当前显示状态和计时器。
      function tempLoadingUpdate(text = "加载中...") {
        if (!tempLoadingHasRequiredElements()) {
          return;
        }

        tempLoadingElements.message.textContent = String(text ?? "加载中...");
      }

      // 隐藏加载动画，并清理自动关闭计时器。
      function tempLoadingHide() {
        if (!tempLoadingHasRequiredElements()) {
          return;
        }

        if (tempLoadingTimer) {
          clearTimeout(tempLoadingTimer);
          tempLoadingTimer = null;
        }

        tempLoadingElements.overlay.classList.remove("temp-loading-is-active");
        tempLoadingElements.overlay.setAttribute("aria-hidden", "true");
      }

      // 读取演示输入框中的值，并触发一次加载动画展示。
      function tempLoadingStartDemo() {
        const tempLoadingText = tempLoadingElements.textInput.value.trim() || "加载中...";
        const tempLoadingDuration = Number(tempLoadingElements.durationInput.value || 0);
        const tempLoadingBlur = tempLoadingElements.blurInput.value.trim();
        const tempLoadingOpacity = tempLoadingElements.opacityInput.value.trim();

        tempLoadingShow({
          text: tempLoadingText,
          duration: tempLoadingDuration,
          blur: tempLoadingBlur,
          opacity: tempLoadingOpacity
        });
      }

      // 绑定演示按钮事件，避免额外暴露页面内部函数。
      function tempLoadingBindDemoEvents() {
        if (tempLoadingElements.showButton) {
          tempLoadingElements.showButton.addEventListener("click", tempLoadingStartDemo);
        }

        if (tempLoadingElements.hideButton) {
          tempLoadingElements.hideButton.addEventListener("click", tempLoadingHide);
        }
      }

      tempLoadingBindDemoEvents();

      window.tempLoadingApi = Object.freeze({
        show: tempLoadingShow,
        hide: tempLoadingHide,
        update: tempLoadingUpdate
      });
    })();
  </script>
</body>
</html>
